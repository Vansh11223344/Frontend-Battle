<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#172B36" />

    <!-- SEO Meta Tags -->
    <title>NeuralFlow — AI-Driven Data Automation Platform</title>
    <meta name="description" content="NeuralFlow is a premium AI-driven data automation platform that transforms raw data into intelligent workflows. Automate, analyze, and accelerate your data pipeline with cutting-edge AI." />
    <meta name="keywords" content="AI automation, data pipeline, machine learning, workflow automation, data analytics, AI platform" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="NeuralFlow Inc." />
    <link rel="canonical" href="https://neuralflow.ai" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://neuralflow.ai" />
    <meta property="og:title" content="NeuralFlow — AI-Driven Data Automation Platform" />
    <meta property="og:description" content="Transform raw data into intelligent workflows with NeuralFlow's advanced AI automation platform. Enterprise-grade, lightning-fast, effortlessly scalable." />
    <meta property="og:image" content="https://neuralflow.ai/og-image.png" />
    <meta property="og:site_name" content="NeuralFlow" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NeuralFlow — AI-Driven Data Automation Platform" />
    <meta name="twitter:description" content="Transform raw data into intelligent workflows with NeuralFlow." />
    <meta name="twitter:image" content="https://neuralflow.ai/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "NeuralFlow",
      "applicationCategory": "BusinessApplication",
      "description": "AI-Driven Data Automation Platform",
      "offers": {
        "@type": "Offer",
        "priceCurrency": "USD"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
